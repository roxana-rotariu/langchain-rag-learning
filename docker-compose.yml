services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-learning-qdrant
    ports:
      - "6333:6333"   # REST API + Web UI (http://localhost:6333/dashboard)
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
