# Application settings. Secrets (API keys) live in .env, NOT here.
# Any value may be overridden by the matching environment variable
# (e.g. CHAT_MODEL, QDRANT_URL) — see config.py.

# Which backend to use: "local" (Ollama + HuggingFace, free, no API key)
# or "anthropic" (Claude + Voyage, needs API keys). Override with LLM_PROVIDER.
provider: local

# Local backend — Ollama (LLM) + HuggingFace (embeddings), runs on your machine.
local:
  chat: qwen2.5:7b                       # good at tool calling (stages 4-6)
  embedding: BAAI/bge-small-en-v1.5      # downloaded on first use
  embedding_dim: 384                     # bge-small produces 384-dim vectors
  ollama_url: http://localhost:11434

# Anthropic backend — kept as a paid fallback (needs ANTHROPIC_API_KEY + VOYAGE_API_KEY).
anthropic:
  chat: claude-sonnet-4-6                # everyday development
  embedding: voyage-3                    # Voyage AI, 1024-dim vectors
  embedding_dim: 1024

qdrant:
  url: http://localhost:6333
  # The provider name is appended to the collection (e.g. "documents_local")
  # because vector size differs per provider (384 local vs 1024 anthropic).
  collection: documents

# Chunking parameters for document ingestion (RAG stage)
chunking:
  chunk_size: 1000
  chunk_overlap: 150

# Default number of chunks retrieved per query
retrieval:
  top_k: 4
