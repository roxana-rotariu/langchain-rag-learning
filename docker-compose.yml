services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-learning-qdrant
    ports:
      # Bind to localhost only — not reachable from the local network.
      - "127.0.0.1:6333:6333"   # REST API + Web UI (http://localhost:6333/dashboard)
      - "127.0.0.1:6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
